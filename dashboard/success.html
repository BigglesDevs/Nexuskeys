<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Confirmed — NexusKeys</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#080b14; --surface:#0d1120; --border:#1e2a3a; --nexus:#6366f1; --nexus2:#818cf8; --green:#22c55e; --text:#e2e8f0; --muted:#64748b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 60% at 50% 50%, #22c55e08 0%, transparent 70%); pointer-events:none; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; text-align:center; max-width:480px; width:90%; position:relative; z-index:1; animation:slideUp .3s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .check { width:72px; height:72px; background:#22c55e18; border:2px solid var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 24px; }
  h1 { font-size:26px; font-weight:700; margin-bottom:8px; }
  p { color:var(--muted); font-size:15px; line-height:1.6; margin-bottom:24px; }
  .info-box { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:24px; text-align:left; }
  .info-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .info-label { color:var(--muted); }
  .info-val { font-weight:600; font-family:'JetBrains Mono',monospace; font-size:12px; }
  .btn { display:inline-block; padding:12px 24px; border-radius:9px; background:var(--nexus); color:#fff; font-weight:600; font-size:14px; text-decoration:none; transition:.15s; }
  .btn:hover { background:var(--nexus2); }
  .discord-note { font-size:12px; color:var(--muted); margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>Payment Confirmed!</h1>
  <p>Your license key has been sent to your <strong style="color:var(--text)">Discord DMs</strong> and is available in your order history.</p>
  <div class="info-box">
    <div class="info-row"><span class="info-label">Status</span><span class="info-val" style="color:#22c55e">✓ COMPLETED</span></div>
    <div class="info-row"><span class="info-label">Delivery</span><span class="info-val">Discord DMs + Dashboard</span></div>
    <div class="info-row"><span class="info-label">Payment</span><span class="info-val">Stripe Secured</span></div>
  </div>
  <a href="/?page=orders" class="btn">View My Orders</a>
  <div class="discord-note">Key also sent to your Discord DMs. Need help? Open a /ticket in our server.</div>
</div>
<script>
  // Extract session_id and redirect properly after 5s if no action
  setTimeout(() => { window.location.href = "/"; }, 8000);
</script>
</body>
</html>
